name: validate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository
        run: python3 scripts/validate_skill.py
